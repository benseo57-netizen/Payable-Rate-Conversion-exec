<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Payable Rate 계산기 (Executive Dashboard)</title>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #F0F4F8; font-family: sans-serif; }
    input[type=number] { -moz-appearance: textfield; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    button { outline: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;
    const LI_CONV = 1 / 0.188;
    const num = v => { const n = parseFloat(String(v).replace(/,/g,"")); return isNaN(n)?0:n; };
    const f2  = n => (n==null||isNaN(n)||!isFinite(n)) ? "—" : n.toFixed(2);
    const f0  = n => (n==null||isNaN(n)||!isFinite(n)) ? "—" : Math.round(n).toLocaleString("ko-KR");
    const fp  = (n,d=1) => (n==null||isNaN(n)||!isFinite(n)) ? "—" : n.toFixed(d)+"%";
    const C = { navy:"#0F172A", blue:"#1D4ED8", amber:"#B45309", green:"#065F46", red:"#B91C1C", purple:"#6D28D9", text:"#0F172A", muted:"#475569", border:"#CBD5E1", card:"#FFFFFF" };

    const PRESETS = {
      "양극분말": [
        { name:"NCM523", co:11.6, ni:28.9, li:6.8 },
        { name:"NCM622", co:11.6, ni:34.5, li:6.8 },
        { name:"NCM811", co: 5.8, ni:45.9, li:6.8 }
      ],
      "셀분말": [
        { name:"NCM622", co: 6.9, ni:20.7, li:4.1 },
        { name:"NCM811", co: 3.5, ni:27.5, li:4.1 }
      ]
    };

    function App() {
      const [inp, setInp] = useState({
        coUSD:"25.53", niUSD:"17650", liUSD:"22.50",
        coContent:"11.6", niContent:"34.5", liContent:"6.8",
        customCo:"", customNi:"", customLi:"",
        compMode:"preset", rateMode:"coni", targetCoNi:"105", er:"1530.11"
      });
      const [activeType, setType] = useState("양극분말");
      const [activePreset, setPreset] = useState("NCM622");

      const activeCo = inp.compMode === "custom" ? inp.customCo : inp.coContent;
      const activeNi = inp.compMode === "custom" ? inp.customNi : inp.niContent;
      const activeLi = inp.compMode === "custom" ? inp.customLi : inp.liContent;
      
      const coP = num(inp.coUSD) * 2.20462;
      const niP = num(inp.niUSD) / 1000;
      const coCont = (num(activeCo)/100) * coP;
      const niCont = (num(activeNi)/100) * niP;
      const liCont = (num(activeLi)/100) * LI_CONV * num(inp.liUSD);
      const coNiCont = coCont + niCont;
      const totCont = coNiCont + liCont;
      const tgtPayable = coNiCont * (num(inp.targetCoNi) / 100);

      return (
        <div style={{ maxWidth:500, margin:"0 auto", background:"#FFF", minHeight:"100vh" }}>
          <div style={{ background:C.navy, padding:20, color:"#FFF" }}>
            <div style={{ fontSize:11, color:C.muted }}>EXECUTIVE DASHBOARD</div>
            <div style={{ fontSize:22, fontWeight:800 }}>Payable 분석 (6월 최신)</div>
          </div>
          <div style={{ padding:16, display:"flex", flexDirection:"column", gap:16 }}>
            {/* 2-1 프리셋 */}
            <div onClick={() => setInp(p=>({...p, compMode:"preset"}))} style={{ padding:14, border:inp.compMode==="preset"?"2px solid "+C.green:"1px solid "+C.border, borderRadius:12, opacity:inp.compMode==="preset"?1:0.5 }}>
              <div style={{ fontSize:13, fontWeight:700, color:C.green, marginBottom:10 }}>2-1. 원료 조성 프리셋</div>
              <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                {PRESETS[activeType].map(p => (
                  <button key={p.name} onClick={() => { setInp(prev=>({...prev, coContent:String(p.co), niContent:String(p.ni), liContent:String(p.li), compMode:"preset"})); setPreset(p.name); }} style={{ padding:"6px 12px", borderRadius:20, border:"1px solid "+C.border, background:activePreset===p.name?"#ECFDF5":"#FFF", cursor:"pointer" }}>{p.name}</button>
                ))}
              </div>
            </div>
            {/* 2-2 직접 입력 */}
            <div onClick={() => setInp(p=>({...p, compMode:"custom"}))} style={{ padding:14, border:inp.compMode==="custom"?"2px solid "+C.blue:"1px solid "+C.border, borderRadius:12, opacity:inp.compMode==="custom"?1:0.5 }}>
              <div style={{ fontSize:13, fontWeight:700, color:C.blue, marginBottom:10 }}>2-2. 함량 자유 입력</div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10 }}>
                {["Co", "Ni", "Li"].map(m => (
                  <div key={m} style={{ textAlign:"center" }}>
                    <div style={{ fontSize:11, color:C.muted }}>{m} %</div>
                    <input type="number" value={inp["custom"+m]} onChange={e => setInp(p=>({...p, ["custom"+m]:e.target.value, compMode:"custom"}))} style={{ width:"100%", fontSize:18, fontWeight:800, textAlign:"center", border:"none", borderBottom:"2px solid "+C.blue }} />
                  </div>
                ))}
              </div>
            </div>
            {/* 결과 섹션 */}
            <div style={{ background:C.navy, padding:20, borderRadius:12, color:"#FFF", textAlign:"center" }}>
              <div style={{ fontSize:12, color:C.muted }}>목표 매입단가</div>
              <div style={{ fontSize:42, fontWeight:800, color:"#FCD34D" }}>${f2(tgtPayable)}<span style={{fontSize:16}}>/kg</span></div>
              <div style={{ fontSize:11, marginTop:10 }}>기준 CoNi 가치: ${f2(coNiCont)}</div>
            </div>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
